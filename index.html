<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>WHO IS EVIL</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin:0; background:#000; color:#0f0; font-family:monospace; overflow:hidden; padding: 0; box-sizing:border-box; }
        .ui { position:absolute; top:10px; left:10px; background:#111; padding:15px; border:1px solid #0f0; z-index:10; width:300px; }
        button,input{ background:#000; color:#0f0; border:1px solid #0f0; padding:5px; margin:3px; width:95%; cursor:pointer; }
        .hidden{ display:none; }
        #chatBox { position:absolute; bottom:10px; left:10px; width:300px; height:150px; background:#111; border:1px solid #0f0; display:none; flex-direction:column; font-size:12px; }
        #chatMessages { flex:1; overflow-y:auto; padding:5px; }
        #chatInput { border:0; border-top:1px solid #0f0; background:#000; color:#0f0; padding:5px; }
        input:focus { outline: 0; }
        button, input { background: #000; color: #0f0; border: 1px solid #0f0; padding: 5px; margin: 3px; width: 95%; cursor: pointer; box-sizing: border-box; }
        .ui { display: flex; flex-direction: column; align-items: center; }
        #info { padding-top:10px; padding-bottom:10px; color: red; }
        #killCooldown { color: #ff6600; font-size: 11px; margin-top: 5px; }
        #gameStatus { color: #ffff00; font-size: 10px; margin-top: 5px; }
        .copy-box { position: relative; cursor: pointer; transition: background 0.3s; }
        .copy-box:hover { background: #e5e7eb; }
        .hint { position: absolute; bottom: -20px; left: 5px; font-size: 10px; color: #3b82f6; opacity: 0; transition: opacity 0.3s; }
        .copy-box:hover .hint { opacity: 1; }
    </style>
</head>
<body>

<div class="ui" id="lobby">
    <input id="nameInput" placeholder="Tên của bạn">
    <button onclick="createRoom()">Tạo phòng</button>
    <input id="joinInput" placeholder="Mã phòng">
    <button onclick="joinRoom()">Vào phòng</button>
    <div class="copy-box" onclick="navigator.clipboard.writeText(document.getElementById('info').innerText.slice(3)); alert('Đã copy!')">
      <div id="info"></div>
      <span class="hint">Ấn để copy nội dung</span>
    </div>
    <button id="readyBtn" class="hidden" onclick="toggleReady()">READY</button>
    <button id="startBtn" class="hidden" onclick="startGame()" disabled>START</button>
    <div id="playerList"></div>
</div>

<div id="chatBox">
    <div id="chatMessages"></div>
    <input id="chatInput" placeholder="Nhập chat... (F để phá mộ, SPACE để chat)">
</div>

<script>
const MAX_PLAYERS = 5;
const KILL_COOLDOWN = 30000; // 30 seconds
const GRAVE_COUNT = 5;
const MIN_GRAVES_BREAK = 3;

let config = { type: Phaser.AUTO, width: 800, height: 600, physics: { default:'arcade', arcade: { debug: false } }, scene: { preload, create, update } };
let game = new Phaser.Game(config);

let scene, cursors, keyX, keyF, peer, myId, myName;
let connections=[], players={}, playersMeta={}, readyState={}, aliveState={}, isHost=false, gameStarted=false, role="human";
let playerGroup, graveGroup, doorSpawned = false;
let lastKillTime = {}, gravesBroken = 0, graves = [];
let lightCircle, darkGraphics;

function preload(){
    scene=this;
    let g=this.make.graphics({add:false});
    g.fillStyle(0xffffff).fillRect(0,0,32,32); g.generateTexture("player",32,32);
    g.clear().fillStyle(0xff0000).fillRect(0,0,32,32); g.generateTexture("ghost",32,32);
    g.clear().fillStyle(0x8B4513).fillRect(0,0,32,32); g.generateTexture("grave",32,32);
    g.clear().fillStyle(0xFFD700).fillRect(0,0,50,100); g.generateTexture("door",50,100);
}

function create(){ 
    cursors = this.input.keyboard.createCursorKeys();
    keyX = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.X);
    keyF = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.F);
    playerGroup = this.physics.add.group({ bounceX: 0.5, bounceY: 0.5 });
    graveGroup = this.physics.add.staticGroup();
    
    // Create dark mask for light circle effect
    darkGraphics = scene.make.graphics({ x: 0, y: 0, add: true });
    darkGraphics.fillStyle(0x000000, 0.8);
    darkGraphics.fillRect(0, 0, 800, 600);
    darkGraphics.depth = 100;
}

function update(){
    if(!players[myId] || !aliveState[myId]) return;
    let me = players[myId];
    me.sprite.setVelocity(0);
    
    let speed = !gameStarted ? 100 : (role==="ghost" ? 220 : 160);
    
    if(cursors.left.isDown) me.sprite.setVelocityX(-speed);
    else if(cursors.right.isDown) me.sprite.setVelocityX(speed);
    if(cursors.up.isDown) me.sprite.setVelocityY(-speed);
    else if(cursors.down.isDown) me.sprite.setVelocityY(speed);

    broadcast({type:"move",id:myId,x:me.sprite.x,y:me.sprite.y});
    me.nameText.setPosition(me.sprite.x, me.sprite.y-25);

    // Update light circle if human (dark viewing)
    if(gameStarted && role==="human" && lightCircle) {
        lightCircle.x = me.sprite.x;
        lightCircle.y = me.sprite.y;
    }

    // LOGIC GIẾT: Nhấn X với cooldown 30s
    if(gameStarted && role==="ghost" && Phaser.Input.Keyboard.JustDown(keyX)){
        let now = Date.now();
        if(!lastKillTime[myId]) lastKillTime[myId] = 0;
        
        if(now - lastKillTime[myId] >= KILL_COOLDOWN) {
            attemptKill();
            lastKillTime[myId] = now;
            addChatMessage("🔪 SÁT NHÂN", "X được sử dụng! Chờ 30s để dùng lại");
        } else {
            let timeLeft = Math.ceil((KILL_COOLDOWN - (now - lastKillTime[myId])) / 1000);
            addChatMessage("⏳ HỆ THỐNG", `X vẫn đang cooldown: ${timeLeft}s`);
        }
    }

    // LOGIC PHÁ MỘ: Nhấn F
    if(gameStarted && Phaser.Input.Keyboard.JustDown(keyF)){
        attemptBreakGrave();
    }
}

function attemptKill(){
    let me = players[myId].sprite;
    Object.keys(players).forEach(id => {
        if(id !== myId && aliveState[id]){
            let target = players[id].sprite;
            let dist = Phaser.Math.Distance.Between(me.x, me.y, target.x, target.y);
            if(dist < 50){
                if(isHost) {
                    confirmKill(id, myId);
                } else {
                    broadcast({type: "killRequest", target: id, killer: myId});
                }
            }
        }
    });
}

function attemptBreakGrave(){
    if(!players[myId]) return;
    let me = players[myId].sprite;
    
    graves.forEach((grave, idx) => {
        if(grave && grave.active) {
            let dist = Phaser.Math.Distance.Between(me.x, me.y, grave.x, grave.y);
            if(dist < 40) {
                grave.destroy();
                graves[idx] = null;
                gravesBroken++;
                addChatMessage("🪦 MỘBỊ PHẮC", `${gravesBroken}/${GRAVE_COUNT}`);
                broadcast({type: "graveBreak", graveIdx: idx, broken: gravesBroken});
                
                // Nếu phá đủ 3 mộ thì spawn cửa
                if(gravesBroken >= MIN_GRAVES_BREAK && !doorSpawned && isHost) {
                    spawnDoor();
                }
            }
        }
    });
}

function spawnDoor(){
    doorSpawned = true;
    let doorX = Phaser.Math.Between(100, 700);
    let doorY = Phaser.Math.Between(100, 500);
    
    let doorSprite = scene.physics.add.sprite(doorX, doorY, "door");
    doorSprite.setTint(0xFFD700);
    
    addChatMessage("🚪 CỬAHÀNG", "Cửa thoát hiểm đã xuất hiện!");
    broadcast({type: "doorSpawn", x: doorX, y: doorY});
}

function spawnPlayer(id,name,color,x,y){
    if(players[id]) return;
    let sprite = scene.physics.add.sprite(x, y, "player").setTint(color);
    sprite.setCollideWorldBounds(true);
    
    scene.physics.add.collider(sprite, playerGroup);
    playerGroup.add(sprite);

    let nameText = scene.add.text(x, y-25, name, {fontSize:"12px", color:"#0f0"}).setOrigin(0.5);
    players[id] = {sprite, nameText, role:"human"};
    aliveState[id] = true;
    if(!playersMeta[id]) playersMeta[id] = {name, color, x, y};
    updateLobbyUI();
}

function createRoom(){
    myName = document.getElementById("nameInput").value.trim() || "Host";
    isHost = true; peer = new Peer();
    peer.on("open", id => {
        myId = id;
        document.getElementById("info").innerText = "ID: " + id;
        document.getElementById("readyBtn").classList.remove("hidden");
        document.getElementById("startBtn").classList.remove("hidden");
        let color = Phaser.Display.Color.RandomRGB().color;
        spawnPlayer(id, myName, color, Phaser.Math.Between(100,700), Phaser.Math.Between(100,500));
    });
    peer.on("connection", conn => {
        setupConn(conn);
        connections.push(conn);
    });
}

function joinRoom(){
    myName = document.getElementById("nameInput").value.trim() || "Guest";
    let room = document.getElementById("joinInput").value.trim();
    if(!room) return alert("Nhập mã phòng!");
    peer = new Peer();
    peer.on("open", id => {
        myId = id;
        let conn = peer.connect(room);
        setupConn(conn);
        connections.push(conn);
        document.getElementById("readyBtn").classList.remove("hidden");
    });
}

function setupConn(conn){
    conn.on("data", data => {
        if(data.type === "sync"){
            playersMeta = data.playersMeta;
            readyState = data.readyState;
            Object.keys(playersMeta).forEach(id => spawnPlayer(id, playersMeta[id].name, playersMeta[id].color, playersMeta[id].x, playersMeta[id].y));
        }
        if(data.type === "newPlayer" && isHost){
            let color = Phaser.Display.Color.RandomRGB().color;
            let rx = Phaser.Math.Between(100,700), ry = Phaser.Math.Between(100,500);
            let pData = {id: data.id, name: data.name, color, x: rx, y: ry};
            spawnPlayer(data.id, data.name, color, rx, ry);
            playersMeta[data.id] = pData; readyState[data.id] = false;
            broadcast({type: "spawn", ...pData});
            conn.send({type: "sync", playersMeta, readyState});
        }
        if(data.type === "spawn") spawnPlayer(data.id, data.name, data.color, data.x, data.y);
        if(data.type === "move" && players[data.id]){
            players[data.id].sprite.setPosition(data.x, data.y);
            players[data.id].nameText.setPosition(data.x, data.y-25);
        }
        if(data.type === "ready"){
            readyState[data.id] = data.state;
            if(isHost) { broadcast(data); updateLobbyUI(); }
        }
        if(data.type === "start") handleStartGame(data.ghostId, data.graves);
        if(data.type === "killRequest" && isHost) confirmKill(data.target, data.killer);
        if(data.type === "playerKilled") handleKill(data.target, data.killer);
        if(data.type === "graveBreak") {
            graves[data.graveIdx] = null;
            gravesBroken = data.broken;
        }
        if(data.type === "doorSpawn") {
            doorSpawned = true;
            let doorSprite = scene.physics.add.sprite(data.x, data.y, "door");
            doorSprite.setTint(0xFFD700);
        }
        if(data.type === "chat") addChatMessage(data.sender, data.msg);
    });
    conn.on("open", () => { if(!isHost) conn.send({type:"newPlayer", id:myId, name:myName}); });
}

function confirmKill(targetId, killerId){
    if(aliveState[targetId]){
        handleKill(targetId, killerId);
        broadcast({type: "playerKilled", target: targetId, killer: killerId});
    }
}

function handleKill(target, killer){
    aliveState[target] = false;
    if(players[target]){ 
        players[target].sprite.destroy(); 
        players[target].nameText.destroy(); 
    }
    if(target === myId){ alert("💀 BẠN ĐÃ BỊ GIẾT!"); location.reload(); }
    if(killer === myId) addChatMessage("Hệ thống", "Bạn đã tiễn 1 linh hồn lên đường 😈");
}

function handleStartGame(ghostId, graveData){
    gameStarted = true;
    document.getElementById("lobby").style.display = "none";
    document.getElementById("chatBox").style.display = "flex";
    role = (myId === ghostId) ? "ghost" : "human";
    
    // Spawn graves
    for(let i = 0; i < GRAVE_COUNT; i++) {
        let gx = Phaser.Math.Between(100, 700);
        let gy = Phaser.Math.Between(100, 500);
        let grave = scene.physics.add.sprite(gx, gy, "grave");
        grave.setTint(0x8B4513);
        graves.push(grave);
    }
    
    // Create light circle for humans (dark viewing)
    if(role === "human") {
        lightCircle = new Phaser.Geom.Circle(players[myId].sprite.x, players[myId].sprite.y, 120);
    }
    
    if(role === "ghost") { 
        players[myId].sprite.setTexture("ghost"); 
        alert("🔪 BẠN LÀ SÁT NHÂN (Nhấn X để giết, cooldown 30s)"); 
    }
    else alert("🙂 Bạn là người thường. Chạy đi!\n\nPhá 3 mộ (F) để mở cửa thoát!");
}

function toggleReady(){
    readyState[myId] = !readyState[myId];
    broadcast({type: "ready", id: myId, state: readyState[myId]});
    updateLobbyUI();
}

function updateLobbyUI(){
    let html = "<b>Phòng:</b><br>";
    Object.keys(playersMeta).forEach(id => {
        html += playersMeta[id].name + (id === myId ? " (Bạn)" : "") + (readyState[id] ? " 🟢" : " 🔴") + "<br>";
    });
    document.getElementById("playerList").innerHTML = html;
    if(isHost){
        let v = Object.values(readyState);
        document.getElementById("startBtn").disabled = !(v.length >= 2 && v.every(val => val));
    }
}

function broadcast(d){ connections.forEach(c => { if(c.open) c.send(d); }); }

function startGame(){
    if(!isHost) return;
    let ids = Object.keys(playersMeta);
    let gId = ids[Math.floor(Math.random() * ids.length)];
    handleStartGame(gId, null);
    broadcast({type: "start", ghostId: gId});
}

function addChatMessage(s,m){
    let d = document.createElement("div"); 
    d.innerHTML = `<b>${s}:</b> ${m}`;
    d.style.wordWrap = "break-word";
    d.style.overflow = "hidden";
    document.getElementById("chatMessages").appendChild(d);
    document.getElementById("chatMessages").scrollTop = 9999;
}

document.getElementById("chatInput").addEventListener("keydown", e => {
    if(e.key === "Enter"){
        e.preventDefault();
        let m = e.target.value.trim();
        
        if(!m) return;
        
        broadcast({type: "chat", sender: playersMeta[myId].name, msg: m});
        addChatMessage("Bạn", m); 
        e.target.value = "";
    }
    // Space should work normally - don't prevent it!
});
</script>
</body>
</html>
