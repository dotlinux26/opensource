<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Juna Horror - Fixed Lobby Build</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin:0; background:#000; color:#0f0; font-family:monospace; overflow:hidden;}
        .ui { position:absolute; top:10px; left:10px; background:#111; padding:15px; border:1px solid #0f0; z-index:10; width:260px;}
        button,input{ background:#000; color:#0f0; border:1px solid #0f0; padding:5px; margin:3px; width:95%; cursor:pointer;}
        .hidden{ display:none; }
        #chatBox { position:absolute; bottom:10px; left:10px; width:300px; height:150px; background:#111; border:1px solid #0f0; display:none; flex-direction:column; font-size:12px;}
        #chatMessages { flex:1; overflow-y:auto; padding:5px; }
        #chatInput { border:0; border-top:1px solid #0f0; background:#000; color:#0f0; padding:5px; }
        #playerList { margin-top:10px; border-top:1px solid #333; padding-top:5px; font-size:13px; }
    </style>
</head>
<body>

<div class="ui" id="lobby">
    <input id="nameInput" placeholder="Tên của bạn">
    <button onclick="createRoom()">Tạo phòng</button>
    <input id="joinInput" placeholder="Mã phòng">
    <button onclick="joinRoom()">Vào phòng</button>
    <div id="info"></div>
    <button id="readyBtn" class="hidden" onclick="toggleReady()">READY</button>
    <button id="startBtn" class="hidden" onclick="startGame()" disabled>START</button>
    <div id="playerList"></div>
</div>

<div id="chatBox">
    <div id="chatMessages"></div>
    <input id="chatInput" placeholder="Nhập chat...">
</div>

<script>
const MAX_PLAYERS = 5;
let config = { type: Phaser.AUTO, width: 800, height: 600, physics: { default:'arcade' }, scene: { preload, create, update } };
let game = new Phaser.Game(config);

let scene, cursors, peer, myId, myName;
let connections=[], players={}, playersMeta={}, readyState={}, aliveState={}, isHost=false, gameStarted=false, role="human";

function preload(){
    scene=this;
    let g=this.make.graphics({add:false});
    g.fillStyle(0xffffff).fillRect(0,0,32,32); g.generateTexture("player",32,32);
    g.clear().fillStyle(0xff0000).fillRect(0,0,32,32); g.generateTexture("ghost",32,32);
}

function create(){ cursors=this.input.keyboard.createCursorKeys(); }

function update(){
    if(!gameStarted || !players[myId] || !aliveState[myId]) return;
    let me=players[myId];
    me.sprite.setVelocity(0);
    let speed = role==="ghost"?210:155;
    if(cursors.left.isDown) me.sprite.setVelocityX(-speed);
    if(cursors.right.isDown) me.sprite.setVelocityX(speed);
    if(cursors.up.isDown) me.sprite.setVelocityY(-speed);
    if(cursors.down.isDown) me.sprite.setVelocityY(speed);

    broadcast({type:"move",id:myId,x:me.sprite.x,y:me.sprite.y});
    me.nameText.setPosition(me.sprite.x,me.sprite.y-25);

    if(role==="ghost"){
        Object.keys(players).forEach(id=>{
            if(id!==myId && aliveState[id] && players[id].role==="human"){
                if(Phaser.Math.Distance.Between(me.sprite.x,me.sprite.y,players[id].sprite.x,players[id].sprite.y)<25){
                    broadcast({type:"killAttempt",target:id});
                }
            }
        });
    }
}

function spawnPlayer(id,name,color,x,y){
    if(players[id]) return;
    let sprite=scene.physics.add.sprite(x,y,"player").setTint(color);
    let nameText=scene.add.text(x,y-25,name,{fontSize:"12px",color:"#0f0"}).setOrigin(0.5);
    players[id]={sprite,nameText,role:"human"};
    aliveState[id]=true;
    if(!playersMeta[id]) playersMeta[id]={name,color,x,y};
    updateLobbyUI();
}

function createRoom(){
    myName=document.getElementById("nameInput").value.trim() || "Host";
    isHost=true; peer=new Peer();
    peer.on("open",id=>{
        myId=id;
        document.getElementById("info").innerText="ID: "+id;
        document.getElementById("readyBtn").classList.remove("hidden");
        document.getElementById("startBtn").classList.remove("hidden");
        let color=Phaser.Display.Color.RandomRGB().color;
        readyState[id]=false;
        spawnPlayer(id,myName,color,400,300);
    });
    peer.on("connection",conn=>{
        setupConn(conn);
        connections.push(conn);
    });
}

function joinRoom(){
    myName=document.getElementById("nameInput").value.trim() || "Guest";
    let room=document.getElementById("joinInput").value.trim();
    if(!room) return alert("Nhập mã phòng!");
    peer=new Peer();
    peer.on("open",id=>{
        myId=id;
        let conn=peer.connect(room);
        setupConn(conn);
        connections.push(conn);
        document.getElementById("readyBtn").classList.remove("hidden");
        // Tự add mình vào meta trước để UI hiện tên mình lên
        playersMeta[id] = {name: myName, color: 0x00ff00, x: 400, y: 300};
        readyState[id] = false;
        updateLobbyUI();
    });
}

function setupConn(conn){
    conn.on("data",data=>{
        if(data.type==="sync"){
            playersMeta=data.playersMeta;
            readyState=data.readyState;
            Object.keys(playersMeta).forEach(id=>spawnPlayer(id,playersMeta[id].name,playersMeta[id].color,playersMeta[id].x,playersMeta[id].y));
            updateLobbyUI();
        }
        if(data.type==="newPlayer" && isHost){
            let color=Phaser.Display.Color.RandomRGB().color;
            let pData = {id:data.id, name:data.name, color, x:400, y:300};
            playersMeta[data.id]=pData; readyState[data.id]=false;
            broadcast({type:"spawn",...pData});
            spawnPlayer(data.id, data.name, color, 400, 300);
            conn.send({type:"sync", playersMeta, readyState});
            updateLobbyUI();
        }
        if(data.type==="spawn") spawnPlayer(data.id,data.name,data.color,data.x,data.y);
        if(data.type==="move" && players[data.id]){
            players[data.id].sprite.setPosition(data.x,data.y);
            players[data.id].nameText.setPosition(data.x,data.y-25);
        }
        if(data.type==="ready"){
            readyState[data.id]=data.state;
            if(isHost) broadcast(data);
            updateLobbyUI();
        }
        if(data.type==="start"){
            gameStarted=true;
            document.getElementById("lobby").classList.add("hidden");
            document.getElementById("chatBox").style.display="flex";
            role=(myId===data.ghostId)?"ghost":"human";
            Object.keys(players).forEach(id => players[id].role = (id===data.ghostId)?"ghost":"human");
            if(role==="ghost") { players[myId].sprite.setTexture("ghost"); alert("🔪 BẠN LÀ SÁT NHÂN"); }
            else alert("🙂 Bạn là người thường");
        }
        if(data.type==="killAttempt" && isHost){
            if(aliveState[data.target]){
                aliveState[data.target]=false;
                broadcast({type:"playerKilled",target:data.target,killer:conn.peer || myId});
                handleKill(data.target, conn.peer || myId);
            }
        }
        if(data.type==="playerKilled") handleKill(data.target, data.killer);
        if(data.type==="chat") addChatMessage(data.sender, data.msg);
    });

    conn.on("open",()=>{
        if(!isHost) conn.send({type:"newPlayer",id:myId,name:myName});
    });
}

function handleKill(target, killer){
    aliveState[target]=false;
    if(players[target]){ players[target].sprite.destroy(); players[target].nameText.destroy(); }
    if(target===myId){ alert("💀 Bạn đã bị giết!"); location.reload(); }
    if(killer===myId) addChatMessage("Hệ thống","Bạn đã giết một người 😈");
}

function toggleReady(){
    readyState[myId]=!readyState[myId];
    broadcast({type:"ready",id:myId,state:readyState[myId]});
    updateLobbyUI();
}

function updateLobbyUI(){
    let html="<b>Danh sách phòng:</b><br>";
    Object.keys(playersMeta).forEach(id=> {
        let status = readyState[id] ? "🟢 Ready" : "🔴 Not Ready";
        html += playersMeta[id].name + (id === myId ? " (Bạn)" : "") + " - " + status + "<br>";
    });
    document.getElementById("playerList").innerHTML=html;
    if(isHost){
        let v=Object.values(readyState);
        document.getElementById("startBtn").disabled=!(v.length>=2 && v.every(val=>val));
    }
}

function broadcast(d){ connections.forEach(c=> {if(c.open) c.send(d)}); }

function startGame(){
    if(!isHost) return;
    let ids=Object.keys(playersMeta);
    let gId=ids[Math.floor(Math.random()*ids.length)];
    broadcast({type:"start",ghostId:gId});
}

function addChatMessage(s,m){
    let d=document.createElement("div"); d.innerHTML=`<span style="color:#0f0">[${s}]:</span> ${m}`;
    document.getElementById("chatMessages").appendChild(d);
    document.getElementById("chatMessages").scrollTop=9999;
}

document.getElementById("chatInput").addEventListener("keydown",e=>{
    if(e.key==="Enter"){
        let m=e.target.value.trim(); if(!m) return;
        broadcast({type:"chat",sender:playersMeta[myId].name,msg:m});
        addChatMessage("Bạn",m); e.target.value="";
    }
});
</script>
</body>
</html>
