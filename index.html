<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Juna Horror - Full Ready System</title>

<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>
body { margin:0; background:#000; color:#0f0; font-family:monospace; overflow:hidden;}
.ui { position:absolute; top:10px; left:10px; background:#111; padding:15px; border:1px solid #0f0; z-index:10; width:250px;}
button,input{ background:#000; color:#0f0; border:1px solid #0f0; padding:5px; margin:3px; width:95%;}
.hidden{ display:none; }
</style>
</head>
<body>

<div class="ui" id="lobby">
<input id="nameInput" placeholder="Tên của bạn">
<button onclick="createRoom()">Tạo phòng</button>
<input id="joinInput" placeholder="Mã phòng">
<button onclick="joinRoom()">Vào phòng</button>

<div id="info"></div>

<button id="readyBtn" class="hidden" onclick="toggleReady()">READY</button>
<button id="startBtn" class="hidden" onclick="startGame()">START</button>

<div id="playerList"></div>
</div>

<script>

const MAX_PLAYERS = 5
const REQUIRED_TOMBS = 3

let config = {
 type: Phaser.AUTO,
 width: 800,
 height: 600,
 physics: { default:'arcade' },
 scene: { preload, create, update }
}

let game = new Phaser.Game(config)
let scene, player, cursors
let peer, myId, myName
let connections=[]
let players={}
let readyState={}
let myReady=false
let tombstonesGroup, door
let destroyedTombs = 0
let role="human"
let gameStarted=false
let isHost=false

function preload(){
 scene=this

 let g=this.make.graphics({add:false})
 g.fillStyle(0xffffff).fillRect(0,0,32,32)
 g.generateTexture("player",32,32)
 g.clear()
 g.fillStyle(0xff0000).fillRect(0,0,32,32)
 g.generateTexture("ghost",32,32)
 g.clear()
 g.fillStyle(0x888888).fillRect(0,0,40,40)
 g.generateTexture("wall",40,40)
 g.clear()
 g.fillStyle(0xaaaaaa).fillCircle(16,16,12)
 g.generateTexture("tomb",32,32)
 g.clear()
 g.fillStyle(0x00ffff).fillRect(0,0,40,60)
 g.generateTexture("door",40,60)
}

function create(){
 cursors=this.input.keyboard.createCursorKeys()
 tombstonesGroup=this.physics.add.staticGroup()

 for(let i=0;i<20;i++){
   scene.physics.add.staticImage(i*40,20,"wall")
   scene.physics.add.staticImage(i*40,580,"wall")
   scene.physics.add.staticImage(20,i*40,"wall")
   scene.physics.add.staticImage(780,i*40,"wall")
 }

 door=scene.physics.add.staticImage(760,300,"door")
 door.visible=false
}

function update(){
 if(!player || !gameStarted) return

 player.setVelocity(0)
 let speed = role==="ghost"?200:150

 if(cursors.left.isDown) player.setVelocityX(-speed)
 if(cursors.right.isDown) player.setVelocityX(speed)
 if(cursors.up.isDown) player.setVelocityY(-speed)
 if(cursors.down.isDown) player.setVelocityY(speed)

 broadcast({type:"move",id:myId,x:player.x,y:player.y})

 if(role==="ghost"){
   Object.keys(players).forEach(id=>{
     if(id!==myId && players[id].role==="human"){
       if(Phaser.Math.Distance.Between(player.x,player.y,players[id].sprite.x,players[id].sprite.y)<25){
         broadcast({type:"dead",id:id})
       }
     }
   })
 }
}

function spawnPlayer(id,color){
 let sprite=scene.physics.add.sprite(400,300,"player")
 sprite.setTint(color)
 players[id]={sprite:sprite,color:color,role:"human"}
 readyState[id]=false
 if(id===myId) player=sprite
 updateLobbyUI()
}

function createRoom(){
 myName=document.getElementById("nameInput").value||"Player"
 isHost=true
 peer=new Peer()
 peer.on("open",id=>{
   myId=id
   document.getElementById("info").innerText="Mã phòng: "+id
   document.getElementById("readyBtn").classList.remove("hidden")
   document.getElementById("startBtn").classList.remove("hidden")
   spawnPlayer(id,Phaser.Display.Color.RandomRGB().color)
 })
 peer.on("connection",conn=>{
   if(Object.keys(players).length>=MAX_PLAYERS){
     conn.close()
     return
   }
   setupConn(conn)
   connections.push(conn)
 })
}

function joinRoom(){
 myName=document.getElementById("nameInput").value||"Player"
 let room=document.getElementById("joinInput").value
 peer=new Peer()
 peer.on("open",id=>{
   myId=id
   let conn=peer.connect(room)
   setupConn(conn)
   connections.push(conn)
   document.getElementById("readyBtn").classList.remove("hidden")
 })
}

function setupConn(conn){
 conn.on("data",data=>{
   if(data.type==="spawn"){
     if(!players[data.id]) spawnPlayer(data.id,data.color)
   }

   if(data.type==="move"){
     if(players[data.id])
       players[data.id].sprite.setPosition(data.x,data.y)
   }

   if(data.type==="ready"){
     readyState[data.id]=data.state
     updateLobbyUI()
   }

   if(data.type==="start") startMatch(data)

   if(data.type==="dead" && data.id===myId){
     alert("💀 Bạn đã chết!")
     location.reload()
   }

   if(data.type==="destroy"){
     destroyedTombs++
     if(destroyedTombs>=REQUIRED_TOMBS)
       door.visible=true
   }
 })

 conn.on("open",()=>{
   let color=Phaser.Display.Color.RandomRGB().color
   spawnPlayer(myId,color)
   conn.send({type:"spawn",id:myId,color:color})
 })
}

function toggleReady(){
 myReady=!myReady
 readyState[myId]=myReady
 broadcast({type:"ready",id:myId,state:myReady})
 updateLobbyUI()
}

function updateLobbyUI(){
 let html=""
 Object.keys(players).forEach(id=>{
   let status=readyState[id]?"🟢 Ready":"🔴 Not Ready"
   html+=id.substring(0,6)+" - "+status+"<br>"
 })
 document.getElementById("playerList").innerHTML=html

 if(isHost){
   let values=Object.values(readyState)
   let allReady=values.length>=2 && values.every(v=>v===true)
   document.getElementById("startBtn").disabled=!allReady
 }
}

function broadcast(data){
 connections.forEach(c=>{ if(c.open)c.send(data) })
}

function startGame(){
 if(!isHost) return
 let values=Object.values(readyState)
 if(values.length<2 || !values.every(v=>v===true)){
   alert("Chưa đủ người hoặc chưa tất cả READY!")
   return
 }

 let ids=[myId,...connections.map(c=>c.peer)]
 let ghostId=ids[Math.floor(Math.random()*ids.length)]

 let tombPos=[
   {x:150,y:150},
   {x:650,y:150},
   {x:400,y:450}
 ]

 broadcast({type:"start",ghostId,tombPos})
 startMatch({ghostId,tombPos})
}

function startMatch(data){
 gameStarted=true
 document.getElementById("lobby").classList.add("hidden")

 role=(myId===data.ghostId)?"ghost":"human"
 players[myId].role=role

 if(role==="ghost") player.setTexture("ghost")

 data.tombPos.forEach(p=>{
   let t=tombstonesGroup.create(p.x,p.y,"tomb")
   t.setInteractive()
   t.on("pointerdown",()=>{
     if(role==="human" && Phaser.Math.Distance.Between(player.x,player.y,p.x,p.y)<60){
       t.destroy()
       broadcast({type:"destroy"})
     }
   })
 })

 scene.physics.add.overlap(player,door,()=>{
   if(role==="human" && destroyedTombs>=REQUIRED_TOMBS){
     alert("🎉 Bạn thắng!")
     location.reload()
   }
 })
}

</script>
</body>
</html>
