<!DOCTYPE html>
<html>
<head>
    <title>Juna Horror - P2P Ghost Game</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: 'Courier New', monospace; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        .ui-overlay { position: absolute; top: 10px; z-index: 10; background: rgba(0,0,0,0.8); padding: 10px; border: 1px solid #0f0; pointer-events: auto; }
        canvas { border: 2px solid #333; cursor: crosshair; }
        #status { color: #f00; font-weight: bold; }
        .btn { background: #000; color: #0f0; border: 1px solid #0f0; padding: 5px 10px; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="ui-overlay" id="lobby">
    <div id="setup-ui">
        <input type="text" id="username" placeholder="Tên của bạn..." class="btn">
        <button onclick="createRoom()" class="btn">Tạo Phòng & Copy Link</button>
        <p>Hoặc dán ID để vào: <input type="text" id="roomIdInput" class="btn"><button onclick="joinRoomManually()" class="btn">Vào</button></p>
    </div>
    <div id="room-info" class="hidden">
        Mã phòng: <span id="display-id">...</span> | Người chơi: <span id="player-count">1</span>/5
        <button id="start-btn" onclick="startGame()" class="btn hidden">BẮT ĐẦU GAME</button>
    </div>
    <div id="game-status"></div>
</div>

<script>
// --- CONFIG GAME ---
const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    physics: { default: 'arcade', arcade: { debug: false } },
    scene: { preload: preload, create: create, update: update }
};

let game = new Phaser.Game(config);
let scene, player, cursors, peer, myId;
let otherPlayers = {}, tombstones = [], walls;
let connections = [], isHost = false, role = 'human', gameStarted = false;
let destroyedTombstones = 0;

function preload() {
    scene = this;
    const graphics = this.make.graphics({ x: 0, y: 0, add: false });
    graphics.fillStyle(0x00ff00).fillRect(0, 0, 32, 32); graphics.generateTexture('human', 32, 32);
    graphics.clear().fillStyle(0xff0000).fillRect(0, 0, 32, 32); graphics.generateTexture('ghost', 32, 32);
    graphics.clear().fillStyle(0x555555).fillRect(0, 0, 40, 40); graphics.generateTexture('wall', 40, 40);
    graphics.clear().fillStyle(0xffffff).fillCircle(16, 16, 10); graphics.generateTexture('tomb', 32, 32);
    graphics.clear().fillStyle(0x442200).fillRect(0,0, 60, 30); graphics.generateTexture('bed', 60, 30);
}

function create() {
    walls = this.physics.add.staticGroup();
    tombstones = this.physics.add.staticGroup();
    this.hidingSpots = this.physics.add.staticGroup();

    for(let i=0; i<20; i++) {
        walls.create(i*40, 20, 'wall'); walls.create(i*40, 580, 'wall');
        walls.create(20, i*40, 'wall'); walls.create(780, i*40, 'wall');
    }
    this.hidingSpots.create(200, 200, 'bed');
    this.hidingSpots.create(600, 400, 'bed');

    cursors = this.input.keyboard.createCursorKeys();
    this.keyE = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.E);

    // Tự động kiểm tra nếu link có sẵn ID (Hash)
    if(window.location.hash) {
        const targetId = window.location.hash.substring(1);
        document.getElementById('roomIdInput').value = targetId;
        joinRoom(targetId);
    }
}

function update() {
    if (!player || !gameStarted) return;
    player.body.setVelocity(0);
    if(player.isHiding) return;

    const speed = (role === 'ghost') ? 220 : 160;
    if (cursors.left.isDown) player.body.setVelocityX(-speed);
    else if (cursors.right.isDown) player.body.setVelocityX(speed);
    if (cursors.up.isDown) player.body.setVelocityY(-speed);
    else if (cursors.down.isDown) player.body.setVelocityY(speed);

    broadcast({ type: 'move', id: myId, x: player.x, y: player.y });

    if (Phaser.Input.Keyboard.JustDown(this.keyE)) {
        scene.physics.overlap(player, scene.hidingSpots, () => {
            player.isHiding = !player.isHiding;
            player.alpha = player.isHiding ? 0.3 : 1;
            broadcast({ type: 'hide', id: myId, state: player.isHiding });
        });
    }
}

// --- LOGIC MẠNG P2P ĐÃ FIX ---

function initPeer(callback) {
    peer = new Peer(); 
    peer.on('open', id => {
        myId = id;
        document.getElementById('display-id').innerText = id;
        document.getElementById('setup-ui').classList.add('hidden');
        document.getElementById('room-info').classList.remove('hidden');
        spawnPlayer(id, true);
        if(callback) callback(id);
    });

    peer.on('connection', conn => {
        connections.push(conn);
        setupConn(conn);
        // Host gửi lời chào và cập nhật số người chơi
        updatePlayerCount();
    });
}

function createRoom() {
    isHost = true;
    initPeer(id => {
        const url = window.location.origin + window.location.pathname + '#' + id;
        window.history.pushState({}, '', '#' + id);
        navigator.clipboard.writeText(url);
        alert("Đã copy link phòng! Gửi cho bạn bè để họ vào thẳng luôn.");
        document.getElementById('start-btn').classList.remove('hidden');
    });
}

function joinRoom(targetId) {
    isHost = false;
    initPeer(myNewId => {
        const conn = peer.connect(targetId);
        connections.push(conn);
        setupConn(conn);
    });
}

function joinRoomManually() {
    const id = document.getElementById('roomIdInput').value;
    if(id) joinRoom(id);
}

function setupConn(conn) {
    conn.on('data', data => {
        if(data.type === 'move') updateOther(data);
        if(data.type === 'start') handleStart(data);
        if(data.type === 'hide') { if(otherPlayers[data.id]) otherPlayers[data.id].alpha = data.state ? 0.3 : 1; }
        if(data.type === 'tomb_broken') { destroyedTombstones++; checkWinCondition(); }
    });
    
    conn.on('open', () => {
        updatePlayerCount();
        if(!isHost) broadcast({type: 'request_sync'}); // Guest yêu cầu đồng bộ
    });
}

function updatePlayerCount() {
    document.getElementById('player-count').innerText = connections.length + 1;
}

function broadcast(data) {
    connections.forEach(c => {
        if (c.open) c.send(data);
    });
}

// --- CÁC HÀM GAMEPLAY ---

function spawnPlayer(id, isMe, isGhost = false) {
    const p = scene.physics.add.sprite(400, 300, isGhost ? 'ghost' : 'human');
    p.setCollideWorldBounds(true);
    scene.physics.add.collider(p, walls);
    if(isMe) player = p;
    else otherPlayers[id] = p;
}

function updateOther(data) {
    if(!otherPlayers[data.id]) spawnPlayer(data.id, false);
    otherPlayers[data.id].setPosition(data.x, data.y);
}

function startGame() {
    if(!isHost) return;
    // Chọn ngẫu nhiên 1 người làm quỷ (có thể là Host hoặc Guest)
    const allIds = [myId, ...connections.map(c => c.peer)];
    const ghostId = allIds[Math.floor(Math.random() * allIds.length)];
    const tPos = [{x:120,y:120}, {x:680,y:120}, {x:400,y:500}];
    
    const startData = { type: 'start', ghostId, tPos };
    broadcast(startData);
    handleStart(startData);
}

function handleStart(data) {
    gameStarted = true;
    document.getElementById('lobby').classList.add('hidden');
    role = (myId === data.ghostId) ? 'ghost' : 'human';
    player.setTexture(role);
    
    data.tPos.forEach(p => {
        let t = tombstones.create(p.x, p.y, 'tomb');
        t.setInteractive().on('pointerdown', () => {
            if(role === 'human' && Phaser.Math.Distance.Between(player.x, player.y, t.x, t.y) < 60) {
                t.destroy();
                broadcast({type: 'tomb_broken'});
                destroyedTombstones++;
                checkWinCondition();
            }
        });
    });

    if(role === 'ghost') {
        scene.physics.add.overlap(player, Object.values(otherPlayers), (me, target) => {
            if(target.alpha > 0.5) {
                alert("BẠN ĐÃ BẮT ĐƯỢC NGƯỜI!");
                // Có thể thêm logic kết thúc game ở đây
            }
        });
    }
}

function checkWinCondition() {
    if(destroyedTombstones >= 3) {
        document.getElementById('game-status').innerText = "CỬA ĐÃ MỞ! CHẠY ĐI!";
    }
}
</script>
</body>
</html>
