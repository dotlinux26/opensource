<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Juna Horror - Final Stable</title>

<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>
body { margin:0; background:#000; color:#0f0; font-family:monospace; overflow:hidden;}
.ui { position:absolute; top:10px; left:10px; background:#111; padding:15px; border:1px solid #0f0; z-index:10; width:260px;}
button,input{ background:#000; color:#0f0; border:1px solid #0f0; padding:5px; margin:3px; width:95%;}
.hidden{ display:none; }
</style>
</head>
<body>

<div class="ui" id="lobby">
<input id="nameInput" placeholder="Tên của bạn">
<button onclick="createRoom()">Tạo phòng</button>
<input id="joinInput" placeholder="Mã phòng">
<button onclick="joinRoom()">Vào phòng</button>

<div id="info"></div>

<button id="readyBtn" class="hidden" onclick="toggleReady()">READY</button>
<button id="startBtn" class="hidden" onclick="startGame()">START</button>

<div id="playerList"></div>
</div>

<script>

const MAX_PLAYERS = 5

let config = {
 type: Phaser.AUTO,
 width: 800,
 height: 600,
 physics: { default:'arcade' },
 scene: { preload, create, update }
}

let game = new Phaser.Game(config)

let scene, cursors
let peer, myId, myName
let connections=[]
let players={}
let playersMeta={}
let readyState={}
let isHost=false
let gameStarted=false
let role="human"

function preload(){
 scene=this

 let g=this.make.graphics({add:false})
 g.fillStyle(0xffffff).fillRect(0,0,32,32)
 g.generateTexture("player",32,32)
 g.clear()
 g.fillStyle(0xff0000).fillRect(0,0,32,32)
 g.generateTexture("ghost",32,32)
}

function create(){
 cursors=this.input.keyboard.createCursorKeys()
}

function update(){
 if(!gameStarted) return

 let me=players[myId]
 if(!me) return

 me.sprite.setVelocity(0)

 let speed = role==="ghost"?200:150

 if(cursors.left.isDown) me.sprite.setVelocityX(-speed)
 if(cursors.right.isDown) me.sprite.setVelocityX(speed)
 if(cursors.up.isDown) me.sprite.setVelocityY(-speed)
 if(cursors.down.isDown) me.sprite.setVelocityY(speed)

 broadcast({type:"move",id:myId,x:me.sprite.x,y:me.sprite.y})

 me.nameText.setPosition(me.sprite.x,me.sprite.y-25)

 if(role==="ghost"){
   Object.keys(players).forEach(id=>{
     if(id!==myId && players[id].role==="human"){
       let a=me.sprite
       let b=players[id].sprite
       if(Phaser.Math.Distance.Between(a.x,a.y,b.x,b.y)<25){
         broadcast({type:"dead",id})
       }
     }
   })
 }
}

function randomSpawn(){
 return {
   x:Phaser.Math.Between(100,700),
   y:Phaser.Math.Between(100,500)
 }
}

function spawnPlayer(id,name,color,x,y){
 if(players[id]) return

 let sprite=scene.physics.add.sprite(x,y,"player")
 sprite.setTint(color)

 let nameText=scene.add.text(x,y-25,name,{
   fontSize:"12px",
   color:"#0f0"
 }).setOrigin(0.5)

 players[id]={sprite,nameText,role:"human"}
 playersMeta[id]={name,color,x,y}
 readyState[id]=false

 updateLobbyUI()
}

function createRoom(){
 myName=document.getElementById("nameInput").value||"Player"
 isHost=true
 peer=new Peer()

 peer.on("open",id=>{
   myId=id
   document.getElementById("info").innerText="Mã phòng: "+id
   document.getElementById("readyBtn").classList.remove("hidden")
   document.getElementById("startBtn").classList.remove("hidden")

   let pos=randomSpawn()
   let color=Phaser.Display.Color.RandomRGB().color
   spawnPlayer(id,myName,color,pos.x,pos.y)
 })

 peer.on("connection",conn=>{
   if(Object.keys(players).length>=MAX_PLAYERS){
     conn.close()
     return
   }

   setupConn(conn)
   connections.push(conn)

   conn.on("open",()=>{
     conn.send({type:"sync",playersMeta,readyState})
   })
 })
}

function joinRoom(){
 myName=document.getElementById("nameInput").value||"Player"
 let room=document.getElementById("joinInput").value

 peer=new Peer()

 peer.on("open",id=>{
   myId=id
   let conn=peer.connect(room)
   setupConn(conn)
   connections.push(conn)
   document.getElementById("readyBtn").classList.remove("hidden")
  })
}

function setupConn(conn){

 conn.on("data",data=>{

   if(data.type==="sync"){
     Object.keys(data.playersMeta).forEach(id=>{
       let p=data.playersMeta[id]
       spawnPlayer(id,p.name,p.color,p.x,p.y)
     })
     readyState=data.readyState||{}
     updateLobbyUI()
   }

   if(data.type==="newPlayer" && isHost){
     spawnPlayer(data.id,data.name,data.color,data.x,data.y)
     broadcast(data)
   }

   if(data.type==="spawn"){
     spawnPlayer(data.id,data.name,data.color,data.x,data.y)
   }

   if(data.type==="move"){
     if(players[data.id]){
       players[data.id].sprite.setPosition(data.x,data.y)
       players[data.id].nameText.setPosition(data.x,data.y-25)
     }
   }

   if(data.type==="ready"){
     readyState[data.id]=data.state
     broadcast(data)
     updateLobbyUI()
   }

   if(data.type==="start"){
     startMatch(data.ghostId)
   }

   if(data.type==="dead" && data.id===myId){
     alert("💀 Bạn đã chết!")
     location.reload()
   }

 })

 conn.on("open",()=>{
   if(!isHost){
     let pos=randomSpawn()
     let color=Phaser.Display.Color.RandomRGB().color

     spawnPlayer(myId,myName,color,pos.x,pos.y)

     conn.send({
       type:"newPlayer",
       id:myId,
       name:myName,
       color,
       x:pos.x,
       y:pos.y
     })
   }
 })

}

function toggleReady(){
 readyState[myId]=!readyState[myId]
 broadcast({type:"ready",id:myId,state:readyState[myId]})
 updateLobbyUI()
}

function updateLobbyUI(){
 let html=""
 Object.keys(players).forEach(id=>{
   let status=readyState[id]?"🟢 Ready":"🔴 Not Ready"
   html+=playersMeta[id].name+" - "+status+"<br>"
 })
 document.getElementById("playerList").innerHTML=html

 if(isHost){
   let vals=Object.values(readyState)
   let allReady=vals.length>=2 && vals.every(v=>v)
   document.getElementById("startBtn").disabled=!allReady
 }
}

function broadcast(data){
 connections.forEach(c=>{ if(c.open)c.send(data) })
}

function startGame(){
 if(!isHost) return

 let vals=Object.values(readyState)
 if(vals.length<2 || !vals.every(v=>v)){
   alert("Chưa đủ người hoặc chưa tất cả READY!")
   return
 }

 let ids=Object.keys(players)
 let ghostId=ids[Math.floor(Math.random()*ids.length)]

 broadcast({type:"start",ghostId})
 startMatch(ghostId)
}

function startMatch(ghostId){
 gameStarted=true
 document.getElementById("lobby").classList.add("hidden")

 role=(myId===ghostId)?"ghost":"human"
 players[myId].role=role

 if(role==="ghost"){
   players[myId].sprite.setTexture("ghost")
 }
}

</script>
</body>
</html>
