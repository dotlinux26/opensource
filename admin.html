<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Page</title>
    <style>
        body {
            color: #475569;
            margin: 0 auto;
            padding: 1rem;
            background-color: #eaeaed;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }

        h1, h2, h3 {
            color: #475569;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }

        h2 {
            font-size: 1.25rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        h3 {
            font-size: 1.125rem;
            font-weight: bold;
            margin-bottom: 0.25rem;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 1rem;
        }

        .concept-list li {
            padding: 0.5rem;
            border-radius: 0.25rem;
            cursor: pointer;
            color: #475569;
            font-weight: normal;
        }

        .concept-list li.selected {
            font-weight: bold;
            font-size: 1.5rem;
        }
    </style>
</head>
<body>
  <iframe src="https://sv.haui.edu.vn" width="100%" height="600"></iframe>
</body>
</html>
